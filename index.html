        function useLocalStorage(key, initialValue) {
            const [storedValue, setStoredValue] = useState(() => {
                if (typeof window === "undefined") return initialValue;
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    console.log(error);
                    return initialValue;
                }
            });
            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    if (typeof window !== "undefined") {
                        window.localStorage.setItem(key, JSON.stringify(valueToStore));
                    }
                } catch (error) {
                    console.log(error);
                }
            };
            return [storedValue, setValue];
        }

        const getPastDays = (count) => {
            const days = [];
            for (let i = count - 1; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                days.push(d.toLocaleDateString('en-CA'));
            }
            return days;

        const getAllTrackedDays = (checkins, moods) => {
            const todayStr = getTodayStr();
            let earliestStr = todayStr;
            const keys = [...Object.keys(checkins), ...Object.keys(moods)];
            keys.forEach(k => {
                if (k < earliestStr) earliestStr = k;
            });
            
            const days = [];
            let curr = new Date(earliestStr + 'T12:00:00');
            const end = new Date(todayStr + 'T12:00:00');
            
            while (curr <= end) {
                days.push(curr.toLocaleDateString('en-CA'));
                curr.setDate(curr.getDate() + 1);
            }
            return days.length < 7 ? getPastDays(7) : days;

                                if (!checkinsMap[c.date]) checkinsMap[c.date] = {};
                                checkinsMap[c.date][c.habit_id] = c.status;
                            });
                            setCheckins(checkinsMap);
                        }

                        if (logsData) {
                            const moodsMap = {};
                            const notesMap = {};
                            logsData.forEach(log => {
                                if (log.mood) moodsMap[log.date] = log.mood;
                                if (log.note) notesMap[log.date] = log.note;
                            });
                            setMoods(moodsMap);
                            setNotes(notesMap);
                        }
                    } catch (err) {
                        console.error('Error fetching data:', err);
                    } finally {
                        setIsDataLoading(false);
                    }
                }
                fetchSupabaseData();
            }, [supabase, user]);

            // SYNC XP TO DATABASE
            useEffect(() => {
                async function syncXP() {
                    if (supabase && user) {
                        try {
                            const { data } = await supabase.from('user_settings').update({ 
                                total_xp: totalXP, 
                                level: currentLevel 
                            }).eq('user_id', user.id).select();
                            
                            if (!data || data.length === 0) {
                                await supabase.from('user_settings').insert([{ 
                                    id: Math.floor(Math.random() * 2000000000), 
                                    user_id: user.id, 
                                    total_xp: totalXP, 
                                    level: currentLevel,
                                    group_code: groupCode,
                                    nickname: nickname
                                }]);
                            }
                        } catch (err) {}
                    }
                }
                syncXP();
            }, [totalXP, currentLevel, supabase, user]);

            const triggerAlarm = (title, body, audioUrl) => {
                if ("Notification" in window && Notification.permission === "granted") {
                    const n = new Notification(title, { body });
                    n.onclick = () => window.focus();
                }
                const audio = new Audio(audioUrl);
                audio.loop = true;
                audio.play().catch(e => console.log('Audio playback prevented:', e));
                setActiveAlarm({ title, body, audio, audioUrl });
            };

            const handleStopAlarm = () => {
                if (activeAlarm && activeAlarm.audio) {
                    activeAlarm.audio.pause();
                    activeAlarm.audio.currentTime = 0;
                }
                setActiveAlarm(null);
            };

            const handleSnoozeAlarm = () => {
                if (activeAlarm && activeAlarm.audio) {
                    activeAlarm.audio.pause();
                    activeAlarm.audio.currentTime = 0;
                }
                const snoozeTime = Date.now() + 5 * 60 * 1000;
                setSnoozedAlarms(prev => [...prev, {
                    id: Date.now().toString(),
                    title: activeAlarm.title,
                    body: activeAlarm.body,
                    audioUrl: activeAlarm.audioUrl,
                    triggerTime: snoozeTime
                }]);
                setActiveAlarm(null);
            };

            const todayStr = getTodayStr();
            const todayCheckins = checkins[todayStr] || {};
            const todayMood = moods[todayStr] || 0;
            const todayNote = notes[todayStr] || '';
            
            const lastNotifiedMinute = useRef('');

            useEffect(() => {
                if ("Notification" in window && Notification.permission === "default") {
                    Notification.requestPermission();
                }

                const intervalId = setInterval(() => {
                    const now = new Date();
                    const currentTimeStr = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
                    const nowMs = now.getTime();
                    
                    if (lastNotifiedMinute.current !== currentTimeStr) {
                        lastNotifiedMinute.current = currentTimeStr;
                        
                        habits.forEach(habit => {
                            if (habit.reminderTime === currentTimeStr) {
                                if (!checkins[todayStr] || checkins[todayStr][habit.id] !== 'done') {
                                    triggerAlarm("Reminder", `It's time for: ${habit.name}`, customAudio || 'https://cdnjs.cloudflare.com/ajax/libs/ion-sound/3.0.1/sounds/bell_ring.mp3');
                                }
                            }
                        });
                    }

                    if (snoozedAlarms.length > 0) {
                        const triggered = snoozedAlarms.filter(a => nowMs >= a.triggerTime);
                        if (triggered.length > 0) {
                            triggered.forEach(a => {
                                triggerAlarm(a.title, a.body, a.audioUrl);
                            });
                            setSnoozedAlarms(prev => prev.filter(a => nowMs < a.triggerTime));
                        }
                    }
                }, 5000);

                return () => clearInterval(intervalId);
            }, [habits, checkins, todayStr, customAudio, snoozedAlarms]);

            const getHabitStreak = (habitId) => {
                let current = 0;
                let best = 0;
                let running = 0;
                const sortedDates = Object.keys(checkins).sort();
                for (let date of sortedDates) {
                    if (checkins[date][habitId] === 'done') {
                        running++;
                        if (running > best) best = running;
                    } else if (checkins[date][habitId] === 'skip') {
                        running = 0;
                    }
                }
                let cur = 0;
                let d = new Date();
                while(true) {
                    let dStr = d.toLocaleDateString('en-CA');
                    if (checkins[dStr] && checkins[dStr][habitId] === 'done') {
                        cur++;
                        d.setDate(d.getDate() - 1);
                    } else if (dStr === todayStr && !checkins[dStr] || (checkins[dStr] && !checkins[dStr][habitId])) {
                        d.setDate(d.getDate() - 1);
                    } else {
                        break;
                    }
                }
                current = cur;
                if(current > best) best = current;
                return { current, best };
            };

            const toggleCheckin = async (habitId, status) => {
                let isDelete = false;
                setCheckins(prev => {
                    const next = { ...prev };
                    if (!next[todayStr]) next[todayStr] = {};
                    if (next[todayStr][habitId] === status) {
                        delete next[todayStr][habitId];
                        isDelete = true;
                    } else {
                        next[todayStr][habitId] = status;
                    }
                    return next;
                });

                if (supabase && user) {
                    if (isDelete) {
                        await supabase.from('habit_checkins').delete().match({ date: todayStr, habit_id: habitId, user_id: user.id });
                    } else {
                        await supabase.from('habit_checkins').upsert({ date: todayStr, habit_id: habitId, status: status, user_id: user.id });
                    }
                }
            };

            /* Gamification logic */
            const totalCompletions = Object.values(checkins).reduce((acc, marks) => acc + Object.values(marks).filter(v => v=== 'done').length, 0);
            let currentTotalStreakXP = 0;
            habits.forEach(h => {
                const { current } = getHabitStreak(h.id);
                if(current > 0) currentTotalStreakXP += (current * 5); 
            });
            const totalXP = (totalCompletions * 20) + currentTotalStreakXP;
            // Level scaling formula
            const currentLevel = Math.floor(Math.sqrt((totalXP < 0 ? 0 : totalXP) / 50)) + 1;
            const nextLevelXP = Math.pow(currentLevel, 2) * 50;
            const prevLevelXP = Math.pow(currentLevel - 1, 2) * 50;
            const progressPercent = Math.max(0, Math.min(100, ((totalXP - prevLevelXP) / (nextLevelXP - prevLevelXP)) * 100));


            const TodayView = () => {
                const [localNote, setLocalNote] = useState(todayNote);
                const [saveStatus, setSaveStatus] = useState('Saved');

                useEffect(() => {
                    setLocalNote(todayNote);
                }, [todayNote]);

                const handleNoteChange = (e) => {
                    setLocalNote(e.target.value);
                    setSaveStatus('Unsaved');
                };

                const handleNoteBlur = async () => {
                    if (localNote !== todayNote) {
                        setSaveStatus('Saving...');
                        setNotes(prev => ({...prev, [todayStr]: localNote}));
                        if (supabase && user) {
                            await supabase.from('daily_logs').upsert({ date: todayStr, note: localNote, user_id: user.id });
                        }
                        setSaveStatus('Saved');
                    }
                };

                return (
                <div className="animate-fade-in w-full space-y-10">
                    <header className="mb-2">
                        <h1 className="text-3xl md:text-4xl font-heading font-extrabold tracking-tight text-textMain">Hello there.</h1>
                        <p className="text-xs md:text-sm font-bold tracking-widest text-textMuted uppercase mt-2">
                            {new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric'})}
                        </p>
                    </header>

                    <div className="flex flex-col lg:flex-row gap-8 lg:gap-12">
                        <div className="w-full lg:w-[35%] order-2 lg:order-1 relative">
                            {/* MOBILE PET HERO */}
                             <div className="lg:hidden bg-gradient-to-br from-surface to-bg p-6 pb-5 rounded-3xl shadow-sm border border-line flex flex-col mb-8 overflow-hidden relative cursor-pointer" onClick={() => {
                                const msgs = ['You got this!', 'Stay focused!', 'Keep the streak alive!', 'Leveling up!', 'Keep it up!'];
                                showToast(msgs[Math.floor(Math.random() * msgs.length)]);
                            }}>
                                <div className="absolute -inset-10 bg-primary/5 blur-2xl rounded-full z-0 pointer-events-none animate-pet-glow"></div>
                                <div className="flex items-center justify-between mb-4 w-full">
                                    <div className="flex flex-col z-10 relative">
                                        <h3 className="text-xl font-heading font-extrabold text-textMain">Gamification</h3>
                                        <p className="text-[11px] font-bold text-textMuted uppercase tracking-widest mt-1">Level {currentLevel}</p>
                                    </div>
                                    <div className="text-3xl text-primary z-10 relative drop-shadow-[0_10px_10px_rgba(0,0,0,0.15)]">
                                        <i className="ph-fill ph-trophy"></i>
                                    </div>
                                </div>
                                <div className="w-full z-10 relative flex flex-col gap-1.5 pt-2 border-t border-line/50">
                                    <div className="flex justify-between w-full">
                                        <span className="text-[9px] font-bold text-textMuted uppercase tracking-widest">To Level {currentLevel + 1}</span>
                                        <span className="text-[9px] font-extrabold text-primary shrink-0">{totalXP} XP</span>
                                    </div>
                                    <div className="h-1.5 w-full bg-surface/50 rounded-full overflow-hidden border border-line/30 shadow-inner">
                                        <div className="h-full bg-primary transition-all duration-1000 ease-out" style={{width: `${progressPercent}%`}}></div>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-surface p-7 rounded-3xl shadow-sm border border-line flex flex-col sticky top-6">
                                <h2 className="text-xs font-bold uppercase tracking-wider text-textMuted mb-6 flex items-center gap-2">
                                    <i className="ph-fill ph-smiley text-base text-primary/80"></i> Mood & Notes
                                </h2>
                                
                                <div className="space-y-8">
                                    <div>
                                        <label className="block text-sm font-bold text-textMain mb-3">How are you feeling?</label>
                                        <div className="flex justify-between gap-1 sm:gap-2">
                                            {[{val:1, icon:'😞'}, {val:2, icon:'😐'}, {val:3, icon:'🙂'}, {val:4, icon:'😊'}, {val:5, icon:'🤩'}].map(m => (
                                                <button 
                                                    key={m.val}
                                                    onClick={async () => {
                                                        setMoods(prev => ({...prev, [todayStr]: m.val}));
                                                        if (supabase && user) await supabase.from('daily_logs').upsert({ date: todayStr, mood: m.val, user_id: user.id });
                                                    }}
                                                    className={`aspect-square w-12 sm:w-14 rounded-2xl text-[24px] sm:text-[28px] flex items-center justify-center transition-all ${todayMood === m.val ? 'bg-primary/10 border border-primary/30 scale-110 saturate-[1.25] shadow-sm relative dark:after:content-[\'\'] dark:after:absolute dark:after:inset-0 dark:after:rounded-2xl dark:after:shadow-[0_0_15px_var(--color-primary)] dark:after:z-[-1]' : 'bg-input border border-transparent grayscale hover:grayscale-0 hover:bg-line'}`}
                                                >
                                                    {m.icon}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    <div className="flex flex-col relative w-full">
                                        <label className="block text-sm font-bold text-textMain mb-3">Journal Entry</label>
                                        <textarea 
                                            className="w-full bg-input border border-line focus:border-primary/50 focus:bg-surface rounded-2xl p-4 md:p-5 text-sm md:text-base focus:ring-0 transition-all resize-none h-44 shadow-inner"
                                            placeholder="Write your thoughts..."
                                            value={localNote}
                                            onChange={handleNoteChange}
                                            onBlur={handleNoteBlur}
                                        ></textarea>
                                        <div className="absolute right-4 bottom-4 flex items-center gap-1.5 text-[10px] font-bold uppercase tracking-widest text-textMuted/40 pointer-events-none">
                                           {saveStatus === 'Saved' ? <><i className="ph-bold ph-check-circle text-primary"></i> Saved</> : saveStatus === 'Unsaved' ? <><i className="ph-bold ph-pencil"></i> Unsaved</> : <><i className="ph-bold ph-spinner animate-spin"></i> Saving...</>}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="w-full lg:w-[65%] order-1 lg:order-2">
                            <h2 className="text-xl font-heading font-extrabold text-textMain mb-6 flex items-center gap-2">
                                Your Reminders
                            </h2>
                            
                            {habits.length === 0 ? (
                                <div className="text-center py-16 bg-surface rounded-3xl shadow-sm border border-line border-dashed flex flex-col items-center">
                                    <i className="ph ph-wind text-5xl mb-4 text-textMuted opacity-20"></i>
                                    <p className="text-textMuted text-sm font-medium mb-4">No reminders aligned for today.</p>
                                    <button onClick={() => setActiveTab('settings')} className="bg-primary text-white font-bold py-3 px-6 rounded-xl text-sm transition-transform hover:-translate-y-0.5 shadow-md">Set up a Reminder</button>
                                </div>
                            ) : (
                                <div className="space-y-4">
                                    {habits.sort((a,b) => {
                                        const p = {High:3, Medium:2, Low:1};
                                        return p[b.priority] - p[a.priority];
                                    }).map(habit => {
                                        const status = todayCheckins[habit.id];
                                        const { current: streak } = getHabitStreak(habit.id);
                                        return (
                                            <div key={habit.id} className="bg-surface p-5 md:p-6 rounded-3xl shadow-sm border border-line flex items-center justify-between gap-4 transition-all hover:shadow-md">
                                                <div className="flex-1 min-w-0 pr-2">
                                                    <div className="flex items-center gap-3 mb-1.5">
                                                        <span className="w-3 h-3 rounded-full shrink-0 shadow-sm" style={{backgroundColor: habit.color}}></span>
                                                        <h3 className="font-bold text-textMain font-heading text-lg md:text-xl truncate leading-tight">{habit.name}</h3>
                                                        <span className={`hidden md:inline-block ml-2 text-[10px] uppercase font-bold tracking-wider px-2 py-0.5 rounded-md ${habit.priority === 'High' ? 'bg-red-50 text-red-600 dark:bg-red-900/40 dark:text-red-400' : habit.priority === 'Medium' ? 'bg-blue-50 text-blue-600 dark:bg-blue-900/40 dark:text-blue-400' : 'bg-green-50 text-green-700 dark:bg-green-900/40 dark:text-green-400'}`}>
                                                            {habit.priority}
                                                        </span>
                                                    </div>
                                                    
                                                    {habit.description && <p className="text-sm text-textMuted mb-3 truncate">{habit.description}</p>}
                                                    
                                                    <div className="flex flex-wrap items-center gap-x-5 gap-y-2 text-xs font-semibold text-textMuted">
                                                        <span className="flex items-center gap-1.5"><i className="ph ph-folder text-sm opacity-70"></i> {habit.category}</span>
                                                        <span className="flex items-center gap-1.5"><i className="ph ph-clock text-sm opacity-70"></i> {habit.reminderTime}</span>
                                                        <span className="flex items-center gap-1.5 text-orange-500 bg-orange-50 dark:bg-orange-950/40 dark:text-orange-400 px-2 py-0.5 rounded-md"><i className="ph-fill ph-fire text-sm"></i> {streak} Day Streak</span>
                                                    </div>
                                                </div>

                                                <div className="flex flex-col gap-2 shrink-0">
                                                    <button 
                                                        onClick={() => toggleCheckin(habit.id, 'done')}
                                                        className={`w-14 h-12 md:w-16 md:h-14 rounded-2xl flex items-center justify-center text-2xl transition-all ${status === 'done' ? 'bg-primary text-white shadow-md' : 'bg-input text-textMuted border border-line hover:bg-primary/10 hover:text-primary hover:border-primary/30'}`}
                                                    >
                                                        <i className="ph-bold ph-check"></i>
                                                    </button>
                                                    <button 
                                                        onClick={() => toggleCheckin(habit.id, 'skip')}
                                                        className={`w-14 h-8 md:w-16 md:h-8 rounded-xl flex items-center justify-center text-[11px] uppercase tracking-wider font-bold transition-all ${status === 'skip' ? 'bg-textMain text-surface shadow-md' : 'bg-input text-textMuted border border-line hover:bg-line hover:text-textMain'}`}
                                                    >
                                                        Skip
                                                    </button>
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
                );
            };

            const FocusView = () => {
                const [customMinutes, setCustomMinutes] = useState(25);
                const [timeLeft, setTimeLeft] = useState(25 * 60);
                const [isActive, setIsActive] = useState(false);
                
                useEffect(() => {
                    let interval = null;
                    if (isActive && timeLeft > 0) {
                        interval = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                    } else if (isActive && timeLeft === 0) {
                        setIsActive(false);
                        triggerAlarm("Focus Zone", "Time is up! Great job focusing.", customAudio || 'https://cdnjs.cloudflare.com/ajax/libs/ion-sound/3.0.1/sounds/glass.mp3');
                    }
                    return () => clearInterval(interval);
                }, [isActive, timeLeft]);

                const handleSliderChange = (e) => {
                    const mins = parseInt(e.target.value);
                    setCustomMinutes(mins);
                    setIsActive(false);
                    setTimeLeft(mins * 60);
                };

                const resetTimer = () => {
                    setIsActive(false);
                    setTimeLeft(customMinutes * 60);
                };

                const toggleTimer = () => setIsActive(!isActive);
                const formatTime = (seconds) => {
                    const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                    const s = (seconds % 60).toString().padStart(2, '0');
                    return `${m}:${s}`;
                };

                return (
                    <div className="animate-fade-in w-full space-y-10 flex flex-col items-center justify-center min-h-[70vh]">
                        <header className="mb-2 text-center">
                            <h1 className="text-3xl md:text-5xl font-heading font-extrabold tracking-tight text-textMain">Focus Zone</h1>
                            <p className="text-sm font-semibold tracking-wide text-textMuted uppercase mt-3">Custom Time Selection</p>
                        </header>

                        <div className="w-full max-w-sm px-6 py-6 bg-surface border border-line rounded-3xl shadow-sm z-10 relative flex flex-col items-center gap-4">
                            <div className="flex justify-between w-full text-xs font-bold text-textMuted uppercase tracking-widest items-center">
                                <span>1m</span>
                                <span className="text-primary font-extrabold text-base bg-primary/10 px-3 py-1 rounded-lg">{customMinutes} MIN</span>
                                <span>120m</span>
                            </div>
                            <input 
                                type="range" 
                                min="1" 
                                max="120" 
                                value={customMinutes} 
                                onChange={handleSliderChange}
                                className="w-full h-2.5 bg-input rounded-full appearance-none cursor-pointer accent-primary focus:outline-none"
                            />
                        </div>

                        <div className="relative w-80 h-80 md:w-96 md:h-96 flex items-center justify-center bg-surface border-[8px] md:border-[12px] border-bg rounded-full shadow-inner my-2 md:my-6 transition-colors duration-500">
                            <div className={`absolute inset-0 rounded-full border-[8px] transition-colors duration-1000 ${isActive ? 'border-primary/50 scale-100' : 'border-transparent scale-95 opacity-0'}`} style={{clipPath: 'circle(50% at 50% 50%)'}}></div>
                            <h2 className="text-7xl md:text-[100px] font-heading font-bold text-textMain tracking-tighter tabular-nums z-10">{formatTime(timeLeft)}</h2>
                        </div>
                        
                        <div className="flex gap-5 z-10">
                            <button onClick={toggleTimer} className={`w-20 h-20 md:w-24 md:h-24 rounded-3xl shadow-lg flex items-center justify-center text-3xl md:text-4xl transition-transform hover:-translate-y-1 ${isActive ? 'bg-[#ffbc42] text-white' : 'bg-primary text-white'}`}>
                                <i className={isActive ? 'ph-bold ph-pause' : 'ph-bold ph-play'}></i>
                            </button>
                            <button onClick={resetTimer} className="w-20 h-20 md:w-24 md:h-24 bg-surface border border-line rounded-3xl flex items-center justify-center text-3xl text-textMuted hover:text-textMain hover:bg-bg transition-all">
                                <i className="ph-bold ph-arrow-counter-clockwise"></i>
                            </button>
                        </div>
                    </div>
                );
            };

            const JournalView = () => {
                const datesWithNotes = Object.keys(notes).map(d => ({ date: d, note: notes[d], mood: moods[d] })).filter(n => n.note || n.mood).sort((a,b) => new Date(b.date) - new Date(a.date));
                const emojiMap = {1:'😞', 2:'😐', 3:'🙂', 4:'😊', 5:'🤩'};

                return (
                    <div className="animate-fade-in w-full space-y-10">
                        <header className="mb-2">
                            <h1 className="text-3xl md:text-4xl font-heading font-extrabold tracking-tight text-textMain">Journal</h1>
                            <p className="text-sm font-semibold tracking-wide text-textMuted uppercase mt-2">History & Reflections</p>
                        </header>

                        {datesWithNotes.length === 0 ? (
                            <div className="text-center py-20 bg-surface rounded-3xl shadow-sm border border-line border-dashed flex flex-col items-center">
                                <i className="ph ph-notebook text-5xl mb-4 text-textMuted opacity-30"></i>
                                <p className="text-textMuted text-sm font-medium">No journal entries found yet.<br/>Log your feelings in the "Today" tab!</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
                                {datesWithNotes.map(entry => (
                                    <div key={entry.date} className="bg-surface p-7 md:p-8 rounded-3xl shadow-sm border border-line flex flex-col break-inside-avoid">
                                        <div className="flex justify-between items-center mb-5 border-b border-line pb-4">
                                            <span className="font-extrabold text-textMain text-sm uppercase tracking-wider">{new Date(entry.date).toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'})}</span>
                                            {entry.mood && <span className="text-3xl drop-shadow-sm" title={`Mood level: ${entry.mood}`}>{emojiMap[entry.mood]}</span>}
                                        </div>
                                        <p className="text-textMuted text-[15px] font-medium leading-relaxed whitespace-pre-wrap">{entry.note || <span className="italic opacity-50">No text logged for today.</span>}</p>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                );
            };

            const AnalyticsView = () => {
                const chartRef = useRef(null);
                const moodChartRef = useRef(null);
                const textColor = isDarkMode ? '#e2e8f0' : '#1A2320';
                const gridColor = isDarkMode ? '#1d2622' : '#edf2ed';

                useEffect(() => {
                    if (chartRef.current && habits.length > 0) {
                        const ctx = chartRef.current.getContext('2d');
                        const allDays = getAllTrackedDays(checkins, moods);
                        const dataset = allDays.map(d => {
                            let total = habits.length;
                            let done = 0;
                            if (checkins[d]) habits.forEach(h => { if (checkins[d][h.id] === 'done') done++; });
                            return total ? (done / total) * 100 : 0;
                        });

                        const chart = new Chart(ctx, {
                            type: 'bar',
                            data: { labels: allDays.map(d => parseInt(d.substring(8))), datasets: [{ label: 'Completion %', data: dataset, backgroundColor: '#4A7C59', borderRadius: 4 }] },
                            options: { responsive: true, maintainAspectRatio: false, plugins:{legend:{display:false}}, scales: { x: { grid: { display:false }, ticks: {color: textColor, autoSkip: true, maxTicksLimit: 30} }, y: { beginAtZero: true, max: 100, border:{display:false}, grid: {color: gridColor}, ticks: {color: textColor} } } }
                        });
                        return () => chart.destroy();
                    }
                }, [checkins, habits, isDarkMode, moods]);

                useEffect(() => {
                    if (moodChartRef.current) {

                                    <div className="flex items-center gap-2">
                                        <span className="text-[10px] font-extrabold text-primary bg-primary/10 px-3 py-1.5 rounded-full uppercase tracking-widest whitespace-nowrap">Lvl {currentLevel} &bull; {totalXP} XP</span>
                                        <button onClick={() => window.location.reload()} className="w-8 h-8 flex items-center justify-center bg-surface border border-line text-textMain rounded-full shadow-sm active:scale-95 transition-transform shrink-0" title="Refresh App">
                                            <i className="ph-bold ph-arrows-clockwise text-sm"></i>
                                        </button>
                                    </div>
                                </div>
                                <div className="h-1.5 w-full bg-surface rounded-full overflow-hidden border border-line shadow-inner">
                                    <div className="h-full bg-primary transition-all duration-1000 ease-out" style={{width: `${progressPercent}%`}}></div>
                                </div>
                            </div>

                            {activeTab === 'today' && <TodayView />}
                            {activeTab === 'focus' && <FocusView />}
                            {activeTab === 'analytics' && <AnalyticsView />}
                            {activeTab === 'journal' && <JournalView />}
                            {activeTab === 'social' && <SocialView />}
                            {activeTab === 'review' && <ReviewView />}
                            {activeTab === 'settings' && <SettingsView />}
                        </div>

                        {/* Custom Toast Notification */}
                        {toast && (
                            <div className="fixed bottom-24 md:bottom-10 left-1/2 -translate-x-1/2 z-[100] animate-fade-in pointer-events-none">
                                <div className={`flex items-center gap-3 px-6 py-4 rounded-2xl shadow-2xl border ${toast.type === 'error' ? 'bg-red-50 border-red-200 text-red-600' : 'bg-surface border-line text-textMain'}`}>
                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center shrink-0 ${toast.type === 'error' ? 'bg-red-500/10' : 'bg-primary/10 text-primary'}`}>
                                        <i className={`ph-bold ${toast.type === 'error' ? 'ph-warning-circle' : 'ph-info'}`}></i>
                                    </div>
                                    <span className="font-extrabold text-sm">{toast.msg}</span>
                                </div>
                            </div>
                        )}
                    </main>

                    {activeAlarm && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm px-6 animate-fade-in">
                            <div className="bg-surface border border-line rounded-3xl p-8 max-w-sm w-full shadow-2xl flex flex-col items-center text-center relative overflow-hidden animate-fade-in">
                                <div className="absolute -inset-10 bg-primary/20 blur-3xl rounded-full z-0 pointer-events-none animate-pulse"></div>
                                
                                <div className="w-20 h-20 bg-surface border border-line text-primary rounded-full flex items-center justify-center mb-6 shadow-md relative z-10">
                                    <i className="ph-fill ph-bell-ringing text-4xl animate-bounce"></i>
                                </div>
                                <h2 className="text-3xl font-heading font-extrabold text-textMain mb-2 relative z-10">{activeAlarm.title}</h2>
                                <p className="text-base font-semibold text-textMuted mb-10 relative z-10">{activeAlarm.body}</p>
                                
                                <div className="flex flex-col md:flex-row gap-4 w-full relative z-10">
                                    <button onClick={handleSnoozeAlarm} className="flex-1 bg-input text-textMain py-4 rounded-xl font-extrabold hover:bg-line transition-all border border-line shadow-sm">
                                        Snooze 5m
                                    </button>
                                    <button onClick={handleStopAlarm} className="flex-1 bg-primary text-white py-4 rounded-xl font-extrabold shadow-md hover:bg-primary/90 transition-all">
                                        Stop Alarm
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showPasswordReset && (
                        <PasswordResetModal 
                            supabase={supabase} 
                            onClose={() => setShowPasswordReset(false)} 
                        />
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
